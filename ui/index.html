<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Tracker</h1>
          <p id="activeMeta">No timer running</p>
        </div>
        <div class="timer-readout" aria-live="polite">
          <span id="activeDuration">00:00:00</span>
          <button id="stopButton" class="danger" disabled>Stop</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="task-panel" aria-label="Start a timer">
          <form id="timerForm">
            <label>
              Task
              <div class="task-picker">
                <select id="taskSelect" name="taskSelect" required>
                  <option value="">Select task</option>
                </select>
                <button id="createTaskButton" class="secondary" type="button">Create</button>
                <button id="closeTaskButton" class="secondary" type="button" disabled>Close</button>
              </div>
            </label>
            <div id="taskSuggestions" class="task-suggestions" hidden></div>

            <label>
              Subtask
              <input id="subtaskName" name="subtaskName" autocomplete="off" placeholder="Design, review, implementation" />
            </label>

            <label>
              Note
              <textarea id="note" name="note" rows="3"></textarea>
            </label>

            <button id="startTimerButton" class="primary" type="submit" disabled>Start timer</button>
          </form>
        </aside>

        <section class="content-panel">
          <nav class="tabs" aria-label="Views">
            <button class="tab active" data-tab="recent" type="button">Recent</button>
            <button class="tab" data-tab="reports" type="button">Reports</button>
          </nav>

          <section id="recentView" class="view active" aria-label="Recent time entries">
            <table>
              <thead>
                <tr>
                  <th>Task</th>
                  <th>Subtask</th>
                  <th>Reference</th>
                  <th>Started</th>
                  <th>Duration</th>
                </tr>
              </thead>
              <tbody id="recentRows"></tbody>
            </table>
          </section>

          <section id="reportsView" class="view" aria-label="Reports">
            <header class="report-toolbar">
              <div class="segmented-control" aria-label="Report period">
                <button id="reportAllTimePeriod" class="segment active" type="button">All Time</button>
                <button id="reportTodayPeriod" class="segment" type="button">Today</button>
              </div>
              <div class="segmented-control" aria-label="Report detail">
                <button id="reportTaskMode" class="segment active" type="button">Task</button>
                <button id="reportSubtaskMode" class="segment" type="button">Subtask</button>
              </div>
            </header>
            <table>
              <thead>
                <tr>
                  <th>Task</th>
                  <th id="summarySubtaskHeader" hidden>Subtask</th>
                  <th>Reference</th>
                  <th>Entries</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="summaryRows"></tbody>
            </table>
          </section>
        </section>
      </section>
    </main>

    <div id="githubTokenDialog" class="dialog-backdrop" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="githubTokenTitle">
        <header class="dialog-header">
          <h2 id="githubTokenTitle">GitHub Token</h2>
          <button id="githubTokenClose" class="ghost" type="button" aria-label="Close">Close</button>
        </header>
        <label>
          Token
          <input id="githubToken" name="githubToken" type="password" autocomplete="off" />
        </label>
        <p id="githubTokenStatus" class="dialog-status" aria-live="polite"></p>
        <footer class="dialog-actions">
          <button id="githubTokenClear" class="secondary" type="button">Clear</button>
          <button id="githubTokenSave" class="primary" type="button">Save</button>
        </footer>
      </section>
    </div>

    <div id="createTaskDialog" class="dialog-backdrop" hidden>
      <section class="dialog dialog-wide" role="dialog" aria-modal="true" aria-labelledby="createTaskTitle">
        <header class="dialog-header">
          <h2 id="createTaskTitle">Create Task</h2>
          <button id="createTaskClose" class="ghost" type="button" aria-label="Close">Close</button>
        </header>

        <div class="dialog-choices" role="tablist" aria-label="Task creation options">
          <button id="createFreeTextMode" class="choice-button active" type="button" data-create-mode="free">
            Custom task
          </button>
          <button id="createIssueMode" class="choice-button" type="button" data-create-mode="issue">
            Import issue from GitHub
          </button>
          <button id="createPullRequestMode" class="choice-button" type="button" data-create-mode="pull_request">
            Import pull request from GitHub
          </button>
        </div>

        <p id="createTaskStatus" class="dialog-status" aria-live="polite"></p>

        <section id="createFreeTextPanel" class="create-task-panel active">
          <label>
            Task name
            <input id="freeTaskName" autocomplete="off" />
          </label>
          <footer class="dialog-actions">
            <button id="createTaskCancel" class="secondary" type="button">Cancel</button>
            <button id="createFreeTask" class="primary" type="button">Create</button>
          </footer>
        </section>

        <section id="createImportPanel" class="create-task-panel">
          <label>
            Search
            <input id="createImportSearch" autocomplete="off" placeholder="owner/repo search terms or owner/repo#123" />
          </label>
          <div id="createImportResults" class="search-results" hidden></div>
        </section>
      </section>
    </div>
  </body>
</html>
